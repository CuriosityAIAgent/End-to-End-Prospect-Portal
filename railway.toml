# Railway deployment — single service (API serves the built frontend).
#
# Setup in the Railway dashboard:
#   1. Add a PostgreSQL plugin → it injects DATABASE_URL automatically.
#   2. Add service variables: OPENAI_API_KEY, ANTHROPIC_API_KEY,
#      DATAFORSEO_LOGIN, DATAFORSEO_PASSWORD, JINA_API_KEY.
#      (PORT is provided by Railway.)
#
# Build compiles the frontend (artifacts/sow-tool/dist/public) and the API
# bundle; start pushes the DB schema then serves both /api and the static app.

[build]
builder = "nixpacks"
buildCommand = "pnpm run build:deploy"

[deploy]
startCommand = "pnpm run db:push && pnpm run start"
restartPolicyType = "on_failure"
