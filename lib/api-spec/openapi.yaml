openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assessments
    description: Source of Wealth client assessments
  - name: prospects
    description: Prospecting pipeline and AI pre-meeting briefings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /assessments:
    get:
      operationId: listAssessments
      tags: [assessments]
      summary: List all client assessments
      responses:
        "200":
          description: A list of assessment summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssessmentSummary"
    post:
      operationId: createAssessment
      tags: [assessments]
      summary: Create a new client assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: The created assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [assessments]
      summary: Get a single assessment with all captured responses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateAssessment
      tags: [assessments]
      summary: Update an assessment (used for autosave)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentUpdate"
      responses:
        "200":
          description: The updated assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAssessment
      tags: [assessments]
      summary: Delete an assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /assessments-overview:
    get:
      operationId: getOverview
      tags: [assessments]
      summary: Aggregate statistics across all assessments
      responses:
        "200":
          description: Overview statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Overview"
  /prospects:
    get:
      operationId: listProspects
      tags: [prospects]
      summary: List all prospects
      responses:
        "200":
          description: A list of prospect summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProspectSummary"
    post:
      operationId: createProspect
      tags: [prospects]
      summary: Create a new prospect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProspectInput"
      responses:
        "201":
          description: The created prospect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
  /prospects/{id}:
    get:
      operationId: getProspect
      tags: [prospects]
      summary: Get a single prospect with full profile and any cached briefing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The prospect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateProspect
      tags: [prospects]
      summary: Update a prospect (used for autosave)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProspectUpdate"
      responses:
        "200":
          description: The updated prospect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProspect
      tags: [prospects]
      summary: Delete a prospect
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /prospects/{id}/briefing:
    post:
      operationId: generateProspectBriefing
      tags: [prospects]
      summary: Generate an AI pre-meeting briefing backed by a live internet search
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The prospect with the freshly generated briefing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Briefing generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /prospects/{id}/convert:
    post:
      operationId: convertProspect
      tags: [prospects]
      summary: Convert a qualified prospect into a client SoW assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: The newly created assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Prospect already converted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ReviewType:
      type: string
      enum: [onboarding, periodic_review, trigger_event]
    RiskRating:
      type: string
      enum: [standard, enhanced]
    AssessmentStatus:
      type: string
      enum: [draft, in_progress, completed]
    Assessment:
      type: object
      required:
        - id
        - clientName
        - status
        - data
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        data:
          type: object
          additionalProperties: true
          description: Free-form record of every captured response, keyed by field id
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssessmentSummary:
      type: object
      required:
        - id
        - clientName
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssessmentInput:
      type: object
      required:
        - clientName
      properties:
        clientName:
          type: string
          minLength: 1
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        data:
          type: object
          additionalProperties: true
    AssessmentUpdate:
      type: object
      properties:
        clientName:
          type: string
          minLength: 1
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        data:
          type: object
          additionalProperties: true
    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        count:
          type: integer
    RiskCount:
      type: object
      required: [riskRating, count]
      properties:
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        count:
          type: integer
    Overview:
      type: object
      required:
        - total
        - byStatus
        - byRisk
        - recentlyUpdated
      properties:
        total:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        byRisk:
          type: array
          items:
            $ref: "#/components/schemas/RiskCount"
        recentlyUpdated:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentSummary"
    ProspectStatus:
      type: string
      enum: [identified, researching, briefed, outreach, converted, dormant]
    BriefingSource:
      type: object
      required: [title, url]
      properties:
        title:
          type: string
        url:
          type: string
    Briefing:
      type: object
      required:
        - summary
        - talkingPoints
        - referralRoutes
        - recommendedApproach
        - sources
        - generatedAt
      properties:
        summary:
          type: string
        talkingPoints:
          type: array
          items:
            type: string
        referralRoutes:
          type: array
          items:
            type: string
        recommendedApproach:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefingSource"
        generatedAt:
          type: string
          format: date-time
    Prospect:
      type: object
      required:
        - id
        - name
        - status
        - data
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        data:
          type: object
          additionalProperties: true
          description: Free-form profile, channels and operational-question notes, keyed by catalog id
        briefing:
          oneOf:
            - $ref: "#/components/schemas/Briefing"
            - type: "null"
        convertedAssessmentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProspectSummary:
      type: object
      required:
        - id
        - name
        - status
        - hasBriefing
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        hasBriefing:
          type: boolean
        convertedAssessmentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProspectInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        data:
          type: object
          additionalProperties: true
    ProspectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        data:
          type: object
          additionalProperties: true
