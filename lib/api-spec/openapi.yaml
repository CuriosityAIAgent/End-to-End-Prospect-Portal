openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assessments
    description: Source of Wealth client assessments
  - name: prospects
    description: Prospecting pipeline and AI pre-meeting briefings
  - name: file-notes
    description: AI rewrite and enhancement of meeting file notes
  - name: source-of-wealth
    description: AI drafting of the Source of Wealth statement
  - name: transcription
    description: Voice-note audio transcription
  - name: Storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /assessments:
    get:
      operationId: listAssessments
      tags: [assessments]
      summary: List all client assessments
      responses:
        "200":
          description: A list of assessment summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssessmentSummary"
    post:
      operationId: createAssessment
      tags: [assessments]
      summary: Create a new client assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: The created assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [assessments]
      summary: Get a single assessment with all captured responses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateAssessment
      tags: [assessments]
      summary: Update an assessment (used for autosave)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentUpdate"
      responses:
        "200":
          description: The updated assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAssessment
      tags: [assessments]
      summary: Delete an assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /assessments-overview:
    get:
      operationId: getOverview
      tags: [assessments]
      summary: Aggregate statistics across all assessments
      responses:
        "200":
          description: Overview statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Overview"
  /prospects:
    get:
      operationId: listProspects
      tags: [prospects]
      summary: List all prospects
      responses:
        "200":
          description: A list of prospect summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProspectSummary"
    post:
      operationId: createProspect
      tags: [prospects]
      summary: Create a new prospect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProspectInput"
      responses:
        "201":
          description: The created prospect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
  /prospects/{id}:
    get:
      operationId: getProspect
      tags: [prospects]
      summary: Get a single prospect with full profile and any cached briefing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The prospect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateProspect
      tags: [prospects]
      summary: Update a prospect (used for autosave)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProspectUpdate"
      responses:
        "200":
          description: The updated prospect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProspect
      tags: [prospects]
      summary: Delete a prospect
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /prospects/{id}/briefing:
    post:
      operationId: generateProspectBriefing
      tags: [prospects]
      summary: Generate an AI pre-meeting briefing backed by a live internet search
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The prospect with the freshly generated briefing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prospect"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Briefing generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /prospects/{id}/convert:
    post:
      operationId: convertProspect
      tags: [prospects]
      summary: Convert a qualified prospect into a client SoW assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: The newly created assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Prospect already converted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /file-notes/rewrite:
    post:
      operationId: rewriteFileNote
      tags: [file-notes]
      summary: Rewrite or enhance a meeting file note into professional private-banking format
      description: >-
        Stateless AI helper used by both the prospect and client file-note
        panels. Without `coverage` it rewrites the raw note into a structured
        professional file note; with `coverage` it enhances an existing draft by
        weaving in the banker's confirmed discussion topics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileNoteRewriteInput"
      responses:
        "200":
          description: The rewritten or enhanced file note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileNoteRewriteResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Rewrite generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /source-of-wealth/draft:
    post:
      operationId: draftSourceOfWealth
      tags: [source-of-wealth]
      summary: Draft a Source of Wealth statement from a meeting note and briefing
      description: >-
        Stateless AI helper for the client assessment. Synthesises a
        regulator-facing Source of Wealth statement from the banker's meeting
        note, optional confirmed discussion topics, and an optional pre-meeting
        briefing. Returns six narrative sections; any section with no basis in
        the inputs is returned empty for the banker to complete. Never
        fabricates facts; plausibility inferences are framed as such.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceOfWealthDraftInput"
      responses:
        "200":
          description: The drafted Source of Wealth statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceOfWealthDraftResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Draft generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /transcription:
    post:
      operationId: transcribeAudio
      tags: [transcription]
      summary: Transcribe a recorded voice note into text
      description: >-
        Stateless audio-transcription helper for the meeting file-note voice
        input. Accepts a base64-encoded audio clip plus its container format and
        returns the transcribed text. Rejects empty transcriptions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscriptionInput"
      responses:
        "200":
          description: The transcribed text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptionResult"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Audio clip too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Transcription failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. These can optionally
        be protected with authentication or ACL checks based on the use case.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`).
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    FileNoteCoverageItem:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string
        detail:
          type: string
    FileNoteRewriteInput:
      type: object
      required: [contact, note]
      properties:
        contact:
          type: string
          minLength: 1
        meetingType:
          type: string
        date:
          type: string
        note:
          type: string
          minLength: 1
        coverage:
          type: array
          description: Confirmed discussion topics; when present the note is enhanced rather than rewritten from scratch
          items:
            $ref: "#/components/schemas/FileNoteCoverageItem"
    FileNoteRewriteResult:
      type: object
      required: [note]
      properties:
        note:
          type: string
    SourceOfWealthBriefingInput:
      type: object
      description: Optional pre-meeting briefing context (subset of the stored briefing)
      properties:
        summary:
          type: string
        talkingPoints:
          type: array
          items:
            type: string
        referralRoutes:
          type: array
          items:
            type: string
        recommendedApproach:
          type: string
    SourceOfWealthDraftInput:
      type: object
      required: [clientName]
      properties:
        clientName:
          type: string
          minLength: 1
        note:
          type: string
          description: The banker's meeting note (may be empty when only a briefing is available)
        coverage:
          type: array
          description: Optional confirmed discussion topics to ground the draft
          items:
            $ref: "#/components/schemas/FileNoteCoverageItem"
        briefing:
          $ref: "#/components/schemas/SourceOfWealthBriefingInput"
    SourceOfWealthStatement:
      type: object
      required: [overview, employment, compensation, assetGrowth, wealthEvents, plausibility]
      properties:
        overview:
          type: string
        employment:
          type: string
        compensation:
          type: string
        assetGrowth:
          type: string
        wealthEvents:
          type: string
        plausibility:
          type: string
    SourceOfWealthDraftResult:
      type: object
      required: [statement]
      properties:
        statement:
          $ref: "#/components/schemas/SourceOfWealthStatement"
    TranscriptionInput:
      type: object
      required: [audio, format]
      properties:
        audio:
          type: string
          minLength: 1
          description: Base64-encoded audio clip (no data-URI prefix)
        format:
          type: string
          minLength: 1
          description: Audio container/extension, e.g. webm, mp4, wav, mp3
    TranscriptionResult:
      type: object
      required: [text]
      properties:
        text:
          type: string
    ReviewType:
      type: string
      enum: [onboarding, periodic_review, trigger_event]
    RiskRating:
      type: string
      enum: [standard, enhanced]
    AssessmentStatus:
      type: string
      enum: [draft, in_progress, completed]
    Assessment:
      type: object
      required:
        - id
        - clientName
        - status
        - data
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        data:
          type: object
          additionalProperties: true
          description: Free-form record of every captured response, keyed by field id
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssessmentSummary:
      type: object
      required:
        - id
        - clientName
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssessmentInput:
      type: object
      required:
        - clientName
      properties:
        clientName:
          type: string
          minLength: 1
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        data:
          type: object
          additionalProperties: true
    AssessmentUpdate:
      type: object
      properties:
        clientName:
          type: string
          minLength: 1
        clientReference:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        reviewType:
          $ref: "#/components/schemas/ReviewType"
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        data:
          type: object
          additionalProperties: true
    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          $ref: "#/components/schemas/AssessmentStatus"
        count:
          type: integer
    RiskCount:
      type: object
      required: [riskRating, count]
      properties:
        riskRating:
          $ref: "#/components/schemas/RiskRating"
        count:
          type: integer
    Overview:
      type: object
      required:
        - total
        - byStatus
        - byRisk
        - recentlyUpdated
      properties:
        total:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        byRisk:
          type: array
          items:
            $ref: "#/components/schemas/RiskCount"
        recentlyUpdated:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentSummary"
    ProspectStatus:
      type: string
      enum: [identified, researching, briefed, outreach, converted, dormant]
    BriefingSource:
      type: object
      required: [title, url]
      properties:
        title:
          type: string
        url:
          type: string
    Briefing:
      type: object
      required:
        - summary
        - talkingPoints
        - referralRoutes
        - recommendedApproach
        - sources
        - generatedAt
      properties:
        summary:
          type: string
        talkingPoints:
          type: array
          items:
            type: string
        referralRoutes:
          type: array
          items:
            type: string
        recommendedApproach:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/BriefingSource"
        generatedAt:
          type: string
          format: date-time
    Prospect:
      type: object
      required:
        - id
        - name
        - status
        - data
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        data:
          type: object
          additionalProperties: true
          description: Free-form profile, channels and operational-question notes, keyed by catalog id
        briefing:
          oneOf:
            - $ref: "#/components/schemas/Briefing"
            - type: "null"
        convertedAssessmentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProspectSummary:
      type: object
      required:
        - id
        - name
        - status
        - hasBriefing
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        hasBriefing:
          type: boolean
        convertedAssessmentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProspectInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        data:
          type: object
          additionalProperties: true
    ProspectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        segment:
          type: ["string", "null"]
        relationshipManager:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ProspectStatus"
        data:
          type: object
          additionalProperties: true
