kind = "video"
previewPath = "/sow-overview-video/"
title = "Source of Wealth — Overview"
version = "1.0.0"
id = "artifacts/sow-overview-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sow-overview-video/" ]
localPort = 18665

[services.development]
run = "pnpm --filter @workspace/sow-overview-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sow-overview-video", "run", "build" ]
publicDir = "artifacts/sow-overview-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18665"
BASE_PATH = "/sow-overview-video/"
