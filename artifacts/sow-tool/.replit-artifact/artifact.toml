kind = "web"
previewPath = "/"
title = "Source of Wealth Tool"
version = "1.0.0"
id = "artifacts/sow-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20807

[services.development]
run = "pnpm --filter @workspace/sow-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sow-tool", "run", "build" ]
publicDir = "artifacts/sow-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20807"
BASE_PATH = "/"
